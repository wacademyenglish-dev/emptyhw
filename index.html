<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOLFAITH Mobile HW: The Empty Tomb</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sacred: {
                            gold: '#D4AF37',
                            gold_dim: '#8B6508',
                            burgundy: '#722F37',
                            dark: '#0f172a', /* slate-900 */
                            panel: '#1e293b', /* slate-800 */
                            border: '#334155' /* slate-700 */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            background-image: radial-gradient(circle at 50% 0%, #0f172a 0%, #020617 80%);
            color: #f4f4f5;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 0; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-wrapper {
            width: 100%; max-width: 430px; height: 100vh; max-height: 100vh;
            background-color: #020617; position: relative; overflow-x: hidden; overflow-y: auto; scroll-behavior: smooth;
        }
        
        .mobile-wrapper::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            opacity: 0.3; mix-blend-mode: color-dodge; pointer-events: none; z-index: 0;
        }

        @media (min-width: 640px) {
            .mobile-wrapper {
                height: 90vh; border-radius: 8px; border: 1px solid #334155;
                box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(212, 175, 55, 0.2);
            }
        }
        
        .mobile-wrapper::-webkit-scrollbar { width: 4px; }
        .mobile-wrapper::-webkit-scrollbar-track { background: transparent; }
        .mobile-wrapper::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); border-radius: 10px; }

        .question-card { 
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.98) 100%);
            border: 1px solid rgba(212, 175, 55, 0.15); 
            backdrop-filter: blur(8px); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
        }
        .question-card.active { border-color: rgba(212, 175, 55, 0.5); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1), inset 0 0 20px rgba(0,0,0,0.8); }

        .option-btn { 
            transition: all 0.2s; border-left: 3px solid transparent; 
            background-color: rgba(0,0,0,0.4); border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .option-btn:hover:not(:disabled) { 
            background: rgba(212, 175, 55, 0.05); border-color: rgba(212, 175, 55, 0.4); 
            transform: translateX(4px); 
        }
        .option-btn.correct { 
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.2) 0%, rgba(6, 78, 59, 0.4) 100%) !important; 
            color: #34d399 !important; border-color: #10b981 !important; border-left: 3px solid #10b981 !important; 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); 
        }
        .option-btn.wrong { 
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.2) 0%, rgba(127, 29, 29, 0.4) 100%) !important; 
            color: #f87171 !important; border-color: #ef4444 !important; border-left: 3px solid #ef4444 !important; 
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); 
        }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.6; }

        .shake { animation: shake 0.4s both; border-color: #ef4444 !important; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(3px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-5px, 0, 0); } 40%, 60% { transform: translate3d(5px, 0, 0); } }

        .progress-point { transition: all 0.3s; }
        .progress-point.filled { background-color: #D4AF37; box-shadow: 0 0 8px #D4AF37; }

        .confetti { position: absolute; width: 6px; height: 12px; opacity: 0; z-index: 100; box-shadow: 0 0 5px currentColor;}
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

        .holy-seal-spin { animation: spin 20s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .pulse-glow { animation: pulseGlow 3s infinite alternate; }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 15px rgba(212,175,55,0.2); } 100% { box-shadow: 0 0 30px rgba(212,175,55,0.5); } }

        .btn-gold {
            background: linear-gradient(135deg, #FFDF73 0%, #D4AF37 40%, #996515 80%, #5c3c08 100%);
            color: #050505; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em;
            border: 1px solid #FFD700; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
        }
        .btn-gold:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5); }
    </style>
</head>
<body>

    <div class="mobile-wrapper" id="app-container">
        
        <!-- HEADER -->
        <header class="sticky top-0 z-50 bg-[#020617]/90 backdrop-blur-lg border-b border-sacred-border px-6 pt-5 pb-3 shadow-md">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="font-serif italic font-bold text-sacred-gold tracking-widest text-xl">WOLFAITH <span class="text-zinc-500 font-sans text-sm not-italic uppercase">HW</span></h1>
                    <p class="font-sans text-[9px] text-zinc-400 uppercase tracking-[0.3em] font-bold mt-1">The Empty Tomb • A1</p>
                </div>
                <div class="text-right bg-sacred-panel px-3 py-1 rounded border border-sacred-border shadow-inner">
                    <span id="score-counter" class="font-sans text-[10px] font-bold text-zinc-300 tracking-widest uppercase">0/15 Risen</span>
                </div>
            </div>
            <div class="flex justify-between gap-1 mb-1" id="progress-container"></div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="p-4 pb-32 space-y-6 relative z-10">
            
            <!-- HERO CARD (The Holy Seal) -->
            <div class="bg-sacred-panel p-6 rounded border border-sacred-border relative overflow-hidden flex flex-col items-center text-center shadow-[0_10px_30px_rgba(0,0,0,0.8)]">
                <div class="absolute w-40 h-40 bg-sacred-gold/10 rounded-full blur-3xl top-0 left-0"></div>
                
                <!-- Animated Seal -->
                <div class="w-24 h-24 rounded-full border border-sacred-gold/30 p-1 mb-6 pulse-glow flex items-center justify-center relative">
                    <div class="w-full h-full rounded-full border border-dashed border-sacred-gold/50 holy-seal-spin absolute inset-0 m-1"></div>
                    <div class="w-20 h-20 rounded-full bg-black flex items-center justify-center border border-sacred-gold/20 shadow-inner relative z-10">
                        <i class="fa-solid fa-sun text-4xl text-sacred-gold drop-shadow-md"></i>
                    </div>
                </div>
                
                <div class="w-full bg-black/60 p-4 text-center border border-sacred-border rounded shadow-inner z-10">
                    <h2 class="font-serif italic text-sacred-gold text-2xl drop-shadow-md">The Dawn's Test</h2>
                    <p class="font-sans text-[10px] font-bold text-zinc-400 mt-2 uppercase tracking-[0.2em]">Past vs Present (Was/Is)</p>
                </div>
            </div>

            <!-- QUIZ CONTAINER -->
            <div id="quiz-container" class="space-y-6 relative z-10"></div>
        </main>

        <!-- STICKY BOTTOM BUTTON -->
        <div class="sticky bottom-0 left-0 w-full bg-gradient-to-t from-[#020617] via-[#020617] to-transparent pt-12 pb-6 px-6 z-50">
            <button id="submit-btn" onclick="checkAllAndSubmit()" class="w-full btn-gold py-4 rounded text-sm flex items-center justify-center gap-3">
                <i class="fa-solid fa-scroll"></i>
                Roll the Stone
            </button>
        </div>

        <!-- SUCCESS OVERLAY (DAWN) -->
        <div id="success-overlay" class="fixed inset-0 bg-gradient-to-t from-[#FFF1C5] via-[#D4AF37] to-[#FFF] z-[100] flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-1000 hidden">
            <div class="w-32 h-32 bg-white border-2 border-sacred-gold rounded-full flex items-center justify-center mb-8 shadow-[0_0_40px_rgba(212,175,55,0.8)] transform scale-50 transition-transform duration-700 pulse-glow" id="success-badge">
                <i class="fa-solid fa-sun text-6xl text-sacred-gold"></i>
            </div>
            <h1 class="font-serif italic font-bold text-5xl text-black mb-3 text-center tracking-tight drop-shadow-sm">He is Risen!</h1>
            <p class="font-sans font-bold text-[#8B6508] tracking-[0.3em] uppercase text-xs mb-8 text-center">The Past is Over</p>
            
            <div class="bg-white/80 border border-[#8B6508]/40 px-10 py-4 rounded mb-8 shadow-[0_0_20px_rgba(139,101,8,0.3)]">
                <div class="font-sans text-black text-xl font-bold tracking-[0.2em] uppercase" id="final-score">SCORE: 15/15</div>
            </div>
            
            <p class="font-serif italic text-zinc-800 text-lg mb-12 text-center max-w-[280px]">Your understanding of Was and Were is perfect. The dawn is here.</p>
            
            <button onclick="location.reload()" class="bg-black text-[#D4AF37] font-sans font-bold px-10 py-3 rounded uppercase text-xs tracking-widest hover:bg-[#D4AF37] hover:text-black transition-colors shadow-xl">
                Retake Journey
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "1. What is the past of 'IS'?", a: ["Are", "Were", "Was"], c: 2 },
            { q: "2. 'He _____ dead on Friday.'", a: ["were", "was", "is"], c: 1 },
            { q: "3. What is the past of 'ARE'?", a: ["Were", "Was", "Am"], c: 0 },
            { q: "4. 'They _____ very sad yesterday.'", a: ["was", "were", "are"], c: 1 },
            { q: "5. 'Now, He _____ alive.'", a: ["is", "was", "were"], c: 0 },
            { q: "6. 'The tomb _____ empty today.'", a: ["was", "were", "is"], c: 0 },
            { q: "7. What is the opposite of 'Dead'?", a: ["Sad", "Alive", "Dark"], c: 1 },
            { q: "8. 'The stone _____ heavy.'", a: ["was", "is", "are"], c: 0 },
            { q: "9. 'We _____ afraid, but now we are happy.'", a: ["was", "were", "are"], c: 1 },
            { q: "10. 'The women _____ at the tomb in the morning.'", a: ["was", "is", "were"], c: 2 },
            { q: "11. What is the opposite of 'Dark'?", a: ["Empty", "Light", "Sad"], c: 1 },
            { q: "12. 'I _____ crying yesterday.'", a: ["were", "was", "am"], c: 1 },
            { q: "13. 'He is not here. He is _____.'", a: ["risen", "dead", "sleeping"], c: 0 },
            { q: "14. What does 'empty' mean?", a: ["Full", "Nothing inside", "Very heavy"], c: 1 },
            { q: "15. 'You _____ safe now.'", a: ["was", "are", "is"], c: 1 }
        ];

        let userAnswers = Array(15).fill(null);
        let solvedCount = 0;

        function initQuiz() {
            const container = document.getElementById('quiz-container');
            const progress = document.getElementById('progress-container');
            
            quizData.forEach((item, idx) => {
                const dot = document.createElement('div');
                dot.className = `h-1 flex-1 bg-sacred-gold/20 rounded-full progress-point dot-${idx}`;
                progress.appendChild(dot);

                const card = document.createElement('div');
                card.className = `question-card rounded-md p-6 q-card-${idx}`;
                card.innerHTML = `
                    <p class="font-serif italic text-xl font-bold mb-5 text-white leading-relaxed tracking-wide drop-shadow-sm">${item.q}</p>
                    <div class="grid grid-cols-1 gap-3 font-sans tracking-wide text-sm">
                        ${item.a.map((opt, oIdx) => `
                            <button class="option-btn text-zinc-300 py-4 px-4 rounded text-left flex items-center justify-between group btn-${idx}-${oIdx}" onclick="answer(${idx}, ${oIdx})">
                                <span>${opt}</span>
                                <div class="w-5 h-5 rounded-full border border-sacred-gold/30 group-hover:border-sacred-gold transition-colors flex items-center justify-center text-[10px]"></div>
                            </button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function answer(qIdx, oIdx) {
            if (userAnswers[qIdx] !== null) return;

            const correct = quizData[qIdx].c;
            const btn = document.querySelector(`.btn-${qIdx}-${oIdx}`);
            const card = document.querySelector(`.q-card-${qIdx}`);
            const dot = document.querySelector(`.dot-${qIdx}`);
            const allBtnsInCard = card.querySelectorAll('.option-btn');

            allBtnsInCard.forEach(b => b.disabled = true);

            if (oIdx === correct) {
                btn.classList.add('correct');
                btn.classList.remove('text-zinc-300');
                btn.querySelector('div').innerHTML = '<i class="fa-solid fa-check"></i>';
                btn.querySelector('div').className = 'w-5 h-5 flex items-center justify-center text-[10px] border-none text-emerald-900 bg-emerald-400 rounded-full shadow-md';
                userAnswers[qIdx] = true;
            } else {
                btn.classList.add('wrong');
                btn.classList.remove('text-zinc-300');
                btn.querySelector('div').innerHTML = '<i class="fa-solid fa-xmark"></i>';
                btn.querySelector('div').className = 'w-5 h-5 flex items-center justify-center text-[10px] border-none text-red-900 bg-red-400 rounded-full shadow-md';
                
                const correctBtn = document.querySelector(`.btn-${qIdx}-${correct}`);
                correctBtn.classList.add('correct');
                correctBtn.classList.remove('text-zinc-300');
                correctBtn.querySelector('div').innerHTML = '<i class="fa-solid fa-check"></i>';
                correctBtn.querySelector('div').className = 'w-5 h-5 flex items-center justify-center text-[10px] border-none text-emerald-900 bg-emerald-400 rounded-full shadow-md';
                
                card.classList.add('shake');
                userAnswers[qIdx] = false;
            }

            dot.classList.add('filled');
            solvedCount++;
            updateHeader();
        }

        function updateHeader() {
            const scoreLabel = document.getElementById('score-counter');
            scoreLabel.innerText = `${solvedCount}/15 RISEN`;
            
            scoreLabel.classList.add('text-sacred-gold');
            scoreLabel.classList.remove('text-zinc-300');
            setTimeout(() => {
                scoreLabel.classList.remove('text-sacred-gold');
                scoreLabel.classList.add('text-zinc-300');
            }, 300);
        }

        function checkAllAndSubmit() {
            if (solvedCount < 15) {
                const btn = document.getElementById('submit-btn');
                btn.classList.add('shake', 'bg-red-900', 'text-white', 'border-red-500');
                btn.classList.remove('btn-gold');
                btn.innerHTML = "JOURNAL INCOMPLETE";
                setTimeout(() => {
                    btn.classList.remove('shake', 'bg-red-900', 'text-white', 'border-red-500');
                    btn.classList.add('btn-gold');
                    btn.innerHTML = `<i class="fa-solid fa-scroll"></i> Roll the Stone`;
                }, 1500);
                return;
            }

            const finalCorrect = userAnswers.filter(a => a === true).length;
            const overlay = document.getElementById('success-overlay');
            const badge = document.getElementById('success-badge');
            
            document.getElementById('final-score').innerText = `SCORE: ${finalCorrect} / 15`;
            
            overlay.style.display = 'flex';
            void overlay.offsetWidth;
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            
            setTimeout(() => {
                badge.classList.remove('scale-50');
                badge.classList.add('scale-100');
                shootConfetti();
            }, 100);
        }

        function shootConfetti() {
            const container = document.getElementById('app-container');
            const colors = ['#D4AF37', '#FFD700', '#FFFFFF', '#FF8C00'];
            for(let i=0; i<80; i++) {
                let c = document.createElement('div');
                c.className = 'confetti rounded-sm';
                c.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                c.style.left = Math.random() * 100 + '%';
                c.style.animation = `fall ${Math.random()*2+2}s linear forwards`;
                c.style.animationDelay = Math.random()*0.5+'s';
                container.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
